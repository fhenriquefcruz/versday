<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#14191c">
  <meta name="description" content="Versículo do dia com experiência contemplativa, compartilhamento social e modo claro/escuro.">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>📖 Vers Day</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="verse-container" id="app">
    <div class="verse-header">
      <h1>Versículo do Dia</h1>
      <div class="header-actions">
        <button id="themeToggleBtn" aria-label="Alternar tema">🌙</button>
        <button id="favoritesBtn" aria-label="Meus favoritos">❤️</button>
        <button id="historyBtn" aria-label="Histórico">📜</button>
      </div>
    </div>
    <div id="verseDynamicZone" class="verse-content"></div>
    <div class="buttons-group">
      <button class="btn btn-refresh" id="refreshBtn" aria-label="Novo Versículo">⟳ Novo</button>
      <button class="btn btn-icon btn-wa" id="shareWABtn" aria-label="Compartilhar imagem no WhatsApp">📱</button>
      <button class="btn btn-icon btn-ig-feed" id="shareIGFeedBtn" aria-label="Imagem para Feed (1080x1080)">📷</button>
      <button class="btn btn-icon btn-ig-story" id="shareIGStoryBtn" aria-label="Imagem para Story (1080x1920)">✨</button>
      <button class="btn btn-icon" id="copyTextBtn" aria-label="Copiar versículo">📋</button>
      <button class="btn btn-icon" id="shareTextBtn" aria-label="Compartilhar texto">🔗</button>
    </div>
    <div class="footer-credit">✨ Desenvolvido por <strong>Fábio Cruz</strong></div>
  </div>

  <!-- Modais (favoritos, histórico) -->
  <div id="favoritesModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>❤️ Versículos favoritos</h2>
      <div id="favoritesList"></div>
    </div>
  </div>
  <div id="historyModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>📜 Histórico (últimos 50)</h2>
      <div id="historyList"></div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
