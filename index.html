<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>📖 Vers Day</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --accent-color: #E4B363;
      --accent-glow: rgba(228, 179, 99, 0.25);
      --transition-speed: 0.4s;
      --card-bg: rgba(20, 25, 28, 0.55);
      --border-light: rgba(255, 255, 255, 0.08);
    }

    body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      position: relative;
      background-size: cover;
      background-position: center 30%;
      background-attachment: fixed;
      transition: background-image var(--transition-speed) cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 40%, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.65) 100%);
      z-index: -1;
      pointer-events: none;
    }

    .verse-container {
      max-width: 680px;
      width: 100%;
      background: var(--card-bg);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 2.5rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.25), 0 0 0 0.5px rgba(255, 255, 255, 0.05) inset;
      padding: 2rem 2rem;
      transition: all var(--transition-speed) ease;
      animation: fadeScaleUp 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    @keyframes fadeScaleUp {
      0% { opacity: 0; transform: scale(0.97) translateY(8px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .verse-content {
      text-align: center;
      margin: 2rem 0 1.8rem;
      min-height: 240px;
      transition: opacity 0.2s ease;
    }
    .verse-header {
      text-align: center;
      margin-bottom: 1.8rem;
    }
    .verse-header h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 500;
      font-size: 1.9rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #F5E7D3 0%, var(--accent-color) 100%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      display: inline-block;
      padding-bottom: 0.3rem;
      border-bottom: 2px solid var(--accent-color);
    }
    .verse-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.3rem, 5vw, 1.9rem);
      line-height: 1.45;
      font-weight: 500;
      color: #FCF7F0;
      text-shadow: 0 2px 8px rgba(0,0,0,0.25);
      margin-bottom: 1.2rem;
    }
    .verse-text::before {
      content: "“";
      font-size: 2rem;
      color: var(--accent-color);
      font-family: serif;
      margin-right: 6px;
      opacity: 0.9;
    }
    .verse-text::after {
      content: "”";
      font-size: 2rem;
      color: var(--accent-color);
      font-family: serif;
      margin-left: 6px;
      vertical-align: top;
      opacity: 0.9;
    }
    .verse-reference-wrapper {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(8px);
      padding: 0.35rem 1.2rem;
      border-radius: 100px;
      margin-top: 0.3rem;
    }
    .verse-reference {
      font-size: 1rem;
      font-weight: 500;
      color: var(--accent-color);
      letter-spacing: 0.3px;
    }
    .chapter-link {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      font-size: 1.2rem;
      transition: transform 0.2s, filter 0.2s;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
    }
    .chapter-link:hover {
      transform: scale(1.12);
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
    }
    .loading-timer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 1.2rem 0;
    }
    .timer-circle {
      width: 85px;
      height: 85px;
      border-radius: 50%;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      font-weight: 600;
      color: var(--accent-color);
      font-family: 'Inter', monospace;
      border: 1.5px solid var(--accent-color);
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }
    .loading-message {
      font-size: 0.95rem;
      color: #E2E8F0;
      background: rgba(0,0,0,0.4);
      padding: 0.4rem 1rem;
      border-radius: 60px;
      backdrop-filter: blur(4px);
    }
    .delay-message {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: #FFE7B6;
      background: rgba(0,0,0,0.5);
      padding: 0.5rem 1rem;
      border-radius: 40px;
      animation: softPulse 1.8s infinite;
      max-width: 90%;
      text-align: center;
    }
    @keyframes softPulse {
      0%, 100% { opacity: 0.7; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.01); }
    }
    .buttons-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0.7rem 1.4rem;
      border-radius: 60px;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
      background: transparent;
      font-family: 'Inter', sans-serif;
      backdrop-filter: blur(8px);
      text-decoration: none;
    }
    .btn-wa {
      background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
      width: 52px;
      height: 52px;
      padding: 0;
      border-radius: 60px;
      box-shadow: 0 6px 14px rgba(37, 211, 102, 0.25);
      border: 1px solid rgba(255,255,255,0.2);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-wa:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 20px rgba(37, 211, 102, 0.35);
    }
    .btn-wa:active {
      transform: scale(0.97);
    }
    .btn-wa svg {
      width: 26px;
      height: 26px;
      display: block;
      margin: 0 auto;
    }
    .btn-refresh {
      background: rgba(20, 25, 28, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #F5E7D3;
      padding: 0.7rem 1.6rem;
      gap: 8px;
      font-weight: 500;
    }
    .btn-refresh:hover {
      background: rgba(228, 179, 99, 0.2);
      border-color: var(--accent-color);
      transform: translateY(-2px);
    }
    .footer-credit {
      text-align: center;
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      font-size: 0.7rem;
      letter-spacing: 0.3px;
      color: rgba(200, 210, 215, 0.8);
    }
    .footer-credit strong {
      color: var(--accent-color);
      font-weight: 500;
    }
    @media (max-width: 580px) {
      .verse-container { padding: 1.5rem; border-radius: 2rem; }
      .verse-text { margin-bottom: 1rem; }
      .verse-reference-wrapper { gap: 6px; padding: 0.25rem 1rem; }
      .btn-wa { width: 48px; height: 48px; }
      .btn-wa svg { width: 24px; height: 24px; }
      .btn-refresh { padding: 0.6rem 1.2rem; font-size: 0.85rem; }
    }
    @media (max-width: 450px) {
      .buttons-group { gap: 0.8rem; }
      .btn-wa { width: 44px; height: 44px; }
      .timer-circle { width: 70px; height: 70px; font-size: 1.9rem; }
    }
  </style>
</head>

  function applyDynamicBackground(verseText) {

  function getChapterLink(bookAbbrev, chapter) {
    let slug = bookAbbrev.toLowerCase();
    const special = { "1sm":"1samuel", "2sm":"2samuel", "1rs":"1reis", "2rs":"2reis", "1cr":"1cronicas", "2cr":"2cronicas", "ct":"cantares", "ec":"eclesiastes", "jr":"jeremias", "is":"isaias", "jo":"joao", "lc":"lucas", "mc":"marcos", "mt":"mateus", "atos":"atos", "ap":"apocalipse", "1co":"1corintios", "2co":"2corintios", "1ts":"1tessalonicenses", "2ts":"2tessalonicenses", "1tm":"1timoteo", "2tm":"2timoteo", "1pe":"1pedro", "2pe":"2pedro", "1jo":"1joao", "2jo":"2joao", "3jo":"3joao" };
    slug = special[slug] || slug;
    slug = slug.replace(/\s/g, '');
    return `https://www.bibliaonline.com.br/ara/${slug}/${chapter}`;
  }
  
  function displayVerse(verse) {
    if (timerInterval) clearInterval(timerInterval);
    const fullBook = bookNameMap[verse.book.toLowerCase()] || verse.book;
    const displayRef = `${fullBook} ${verse.chapter}:${verse.verse}`;
    const chapterUrl = getChapterLink(verse.book, verse.chapter);
    const html = `
      <div class="verse-text">${escapeHtml(verse.text)}</div>
      <div class="verse-reference-wrapper">
        <span class="verse-reference">${escapeHtml(displayRef)}</span>
        <a href="${chapterUrl}" target="_blank" rel="noopener noreferrer" class="chapter-link" title="Ler capítulo completo (ARA)">
          <span>📖</span>
        </a>
      </div>
    `;
    smoothContentUpdate(html);
    const shareMsg = `${verse.text} (${displayRef} - ARA)`;
    const waUrl = `https://wa.me/?text=${encodeURIComponent(shareMsg)}`;
    waContainer.innerHTML = `<a href="${waUrl}" target="_blank" rel="noopener noreferrer" class="btn btn-wa">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
        <path d="M12.04 2c-5.46 0-9.91 4.45-9.91 9.91 0 1.75.46 3.45 1.32 4.95L2.05 22l5.25-1.38c1.45.79 3.08 1.21 4.74 1.21 5.46 0 9.91-4.45 9.91-9.91 0-5.45-4.45-9.9-9.91-9.9zm0 18.23c-1.5 0-2.97-.39-4.26-1.12l-.3-.18-3.12.82.84-3.04-.2-.31c-.79-1.35-1.21-2.9-1.21-4.48 0-4.56 3.71-8.27 8.27-8.27 4.56 0 8.27 3.71 8.27 8.27-.02 4.55-3.72 8.26-8.29 8.26zM16.5 13.5c-.26-.13-1.55-.77-1.79-.86-.23-.09-.42-.13-.6.13-.18.26-.69.86-.85 1.04-.16.18-.31.2-.58.07-.26-.13-1.12-.41-2.13-1.32-.79-.71-1.32-1.59-1.47-1.86-.16-.26-.02-.4.11-.53.11-.12.26-.31.39-.47.13-.16.17-.26.26-.43.09-.17.04-.32-.02-.45s-.6-1.44-.82-1.97c-.21-.52-.43-.45-.6-.46-.16-.01-.34-.01-.52-.01-.18 0-.47.07-.71.32-.25.25-.94.92-.94 2.24 0 1.32.96 2.6 1.09 2.78.14.18 1.89 2.88 4.57 4.03 2.68 1.15 2.68.77 3.16.72.48-.05 1.55-.63 1.77-1.24.22-.61.22-1.13.15-1.24-.06-.1-.23-.16-.49-.29z" fill="white"/>
      </svg>
    </a>`;
    applyDynamicBackground(verse.text);
    currentVerse = verse;
    lastVerseRef = verse.reference;
  }
  
  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  function showLoadingWithTimer() {
    if (timerInterval) clearInterval(timerInterval);
    const start = Date.now();
    const container = document.getElementById('verseDynamicZone');
    container.innerHTML = `
      <div class="loading-timer">
        <div class="timer-circle" id="timerSeconds">0</div>
        <div class="loading-message">Buscando versículo...</div>
        <div id="delayMessage" style="min-height: 50px;"></div>
      </div>
    `;
    waContainer.innerHTML = '';
    const timerEl = document.getElementById('timerSeconds');
    const delayDiv = document.getElementById('delayMessage');
    timerInterval = setInterval(() => {
      const elapsed = Math.floor((Date.now() - start) / 1000);
      if (timerEl) timerEl.textContent = elapsed;
      if (elapsed >= 10 && delayDiv && !delayDiv.innerHTML) {
        delayDiv.innerHTML = `<div class="delay-message">🙏 Estamos buscando o versículo, desculpe a demora.<br>Muitas requisições ao mesmo tempo. Em breve aparecerá.</div>`;
      }
    }, 1000);
  }
  
  async function fetchVerseFromAPI() {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), TIMEOUT_MS);
    try {
      const res = await fetch(API_URL, { signal: controller.signal });
      clearTimeout(timeoutId);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      return {
        text: data.text,
        reference: data.reference,
        book: data.book_id,
        chapter: data.chapter,
        verse: data.verse
      };
    } catch (e) {
      clearTimeout(timeoutId);
      return null;
    }
  }
  
  function isVerseInCache(verse) {
    if (!verse) return true;
    return verseCache.some(v => v.reference === verse.reference);
  }
  
  async function addToCache() {
    if (isLoading) return;
    let newVerse = null;
    let attempts = 0;
    const maxAttempts = 5;
    while (!newVerse && attempts < maxAttempts) {
      const fetched = await fetchVerseFromAPI();
      if (fetched && !isVerseInCache(fetched) && (!currentVerse || fetched.reference !== currentVerse.reference)) {
        newVerse = fetched;
        break;
      }
      attempts++;
      await new Promise(r => setTimeout(r, 200));
    }
    if (newVerse) {
      verseCache.push(newVerse);
      if (verseCache.length > CACHE_SIZE) verseCache.shift();
    }
  }
  
  async function preloadCache() {
    while (verseCache.length < CACHE_SIZE && !isLoading) {
      await addToCache();
      await new Promise(r => setTimeout(r, 400));
    }
  }
  
  async function getNextVerse() {
    if (verseCache.length > 0) {
      let index = 0;
      while (index < verseCache.length && currentVerse && verseCache[index].reference === currentVerse.reference) index++;
      if (index < verseCache.length) {
        const next = verseCache[index];
        verseCache.splice(index, 1);
        addToCache();
        return next;
      }
    }
    let newVerse = null;
    let attempts = 0;
    while (!newVerse && attempts < 3) {
      const fetched = await fetchVerseFromAPI();
      if (fetched && (!currentVerse || fetched.reference !== currentVerse.reference)) {
        newVerse = fetched;
        break;
      }
      attempts++;
      await new Promise(r => setTimeout(r, 300));
    }
    if (newVerse) return newVerse;
    let available = LOCAL_VERSE_LIST.filter(v => v.reference !== lastVerseRef);
    if (available.length === 0) available = LOCAL_VERSE_LIST;
    const randomIndex = Math.floor(Math.random() * available.length);
    return { ...available[randomIndex] };
  }
  
  async function loadNewVerse() {
    if (isLoading) return;
    isLoading = true;
    showLoadingWithTimer();
    try {
      const verse = await getNextVerse();
      displayVerse(verse);
    } catch (err) {
      console.error(err);
      displayVerse(LOCAL_VERSE_LIST[0]);
    } finally {
      isLoading = false;
      if (timerInterval) clearInterval(timerInterval);
      if (verseCache.length < 2) preloadCache();
    }
  }
  
  refreshBtn.addEventListener('click', () => {
    if (!isLoading) loadNewVerse();
  });
  
  loadNewVerse();
</script>
</body>
</html>
