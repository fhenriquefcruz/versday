<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <meta name="theme-color" content="#0d1117">
  <meta name="description" content="Versículo do Dia — experiência contemplativa com compartilhamento social.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Vers Day">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <title>✦ Vers Day</title>

  <!-- Fontes: Lora (sermônica) + Inter (UI limpa) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

  <div class="verse-container" id="app">

    <!-- CABEÇALHO -->
    <header class="verse-header">
      <h1>Versículo do Dia</h1>
      <div class="header-actions">
        <button id="favoriteCurrentBtn" class="icon-btn" aria-label="Favoritar versículo" title="Favoritar">☆</button>
        <button id="themeToggleBtn"     class="icon-btn" aria-label="Alternar tema" title="Tema">🌙</button>
        <button id="favoritesBtn" class="btn-text-only" aria-label="Meus favoritos">⭐ Favoritos</button>
        <button id="historyBtn"   class="icon-btn" aria-label="Histórico" title="Histórico">📜</button>
      </div>
    </header>

    <!-- VERSÍCULO -->
    <div id="verseDynamicZone" class="verse-content" aria-live="polite" aria-atomic="true"></div>

    <!-- BOTÕES DE AÇÃO -->
    <div class="buttons-group" role="group" aria-label="Ações do versículo">
      <button class="btn btn-refresh" id="refreshBtn" aria-label="Novo versículo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>
        Novo
      </button>

      <!-- WhatsApp -->
      <button class="btn btn-icon" id="shareWABtn" aria-label="Compartilhar no WhatsApp" title="WhatsApp">
        <svg viewBox="0 0 24 24" fill="white">
          <path d="M12.04 2c-5.46 0-9.91 4.45-9.91 9.91 0 1.75.46 3.45 1.32 4.95L2.05 22l5.25-1.38c1.45.79 3.08 1.21 4.74 1.21 5.46 0 9.91-4.45 9.91-9.91 0-5.45-4.45-9.9-9.91-9.9zm0 18.23c-1.5 0-2.97-.39-4.26-1.12l-.3-.18-3.12.82.84-3.04-.2-.31c-.79-1.35-1.21-2.9-1.21-4.48 0-4.56 3.71-8.27 8.27-8.27 4.56 0 8.27 3.71 8.27 8.27-.02 4.55-3.72 8.26-8.29 8.26zm4.46-6.5c-.26-.13-1.55-.77-1.79-.86-.23-.09-.42-.13-.6.13-.18.26-.69.86-.85 1.04-.16.18-.31.2-.58.07-.26-.13-1.12-.41-2.13-1.32-.79-.71-1.32-1.59-1.47-1.86-.16-.26-.02-.4.11-.53.11-.12.26-.31.39-.47.13-.16.17-.26.26-.43.09-.17.04-.32-.02-.45s-.6-1.44-.82-1.97c-.21-.52-.43-.45-.6-.46-.16-.01-.34-.01-.52-.01-.18 0-.47.07-.71.32-.25.25-.94.92-.94 2.24 0 1.32.96 2.6 1.09 2.78.14.18 1.89 2.88 4.57 4.03 2.68 1.15 2.68.77 3.16.72.48-.05 1.55-.63 1.77-1.24.22-.61.22-1.13.15-1.24-.06-.1-.23-.16-.49-.29z"/>
        </svg>
      </button>

      <!-- Instagram -->
      <button class="btn btn-icon" id="shareIGBtn" aria-label="Compartilhar no Instagram" title="Instagram">
        <svg viewBox="0 0 24 24" fill="white">
          <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 10-2.881 0 1.44 1.44 0 002.881 0z"/>
        </svg>
      </button>

      <!-- Copiar -->
      <button class="btn btn-icon" id="copyTextBtn" aria-label="Copiar versículo" title="Copiar texto">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
        </svg>
      </button>
    </div>

    <!-- CHAT BÍBLICO -->
    <section class="research-area" aria-label="Assistente bíblico">
      <span class="research-label">Pergunte sobre a Bíblia</span>
      <div class="question-prompt">
        <input
          type="text"
          id="initialQuestion"
          placeholder="Ex: O que significa ter fé?"
          aria-label="Sua pergunta bíblica"
          autocomplete="off"
        >
        <button id="askInitialBtn" class="btn btn-primary">Perguntar</button>
      </div>

      <div id="chatContainer" style="display:none;">
        <div class="chat-messages" id="chatMessages" aria-live="polite">
          <div class="chat-message system">
            <strong>Assistente Teológico</strong>
            👋 Olá! Pode perguntar sobre qualquer passagem ou tema bíblico.
          </div>
        </div>
        <div id="chatLoading" class="chat-loading" style="display:none;" aria-live="polite">
          ✦ Pensando...
        </div>
        <div class="chat-input-area">
          <input type="text" id="chatInput" placeholder="Continue a conversa..." aria-label="Continuar conversa" autocomplete="off">
          <button id="sendChatBtn" class="btn">Enviar</button>
        </div>
      </div>
    </section>

    <!-- RODAPÉ -->
    <footer class="footer-credit">
      Desenvolvido com 🤍 por <strong>Fábio Cruz</strong>
    </footer>
    <div id="unsplash-credit" class="unsplash-credit"></div>

  </div><!-- /verse-container -->

  <!-- MODAIS -->
  <div id="favoritesModal" class="modal" role="dialog" aria-modal="true" aria-label="Meus favoritos">
    <div class="modal-content">
      <span class="close" role="button" tabindex="0" aria-label="Fechar">&times;</span>
      <h2>⭐ Meus Favoritos</h2>
      <div id="favoritesList"></div>
    </div>
  </div>

  <div id="historyModal" class="modal" role="dialog" aria-modal="true" aria-label="Histórico">
    <div class="modal-content">
      <span class="close" role="button" tabindex="0" aria-label="Fechar">&times;</span>
      <h2>📜 Histórico <small style="font-size:.75rem;opacity:.6;font-weight:400">(últimos 50)</small></h2>
      <div id="historyList"></div>
    </div>
  </div>

  <!-- JS módulos -->
  <script type="module" src="./js/main.js"></script>

  <!-- Service Worker — path relativo: funciona em /versday/ no GitHub Pages -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(r => console.log('[VersDay] SW registrado:', r.scope))
          .catch(e => console.warn('[VersDay] SW falhou:', e));
      });
    }
  </script>

</body>
</html>
