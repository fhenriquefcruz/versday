<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <meta name="description" content="Versículo diário - Almeida Revista e Atualizada">
  <title>Versículo do Dia</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --accent-color: #E4B363;
      --accent-glow: rgba(228, 179, 99, 0.3);
      --transition-speed: 0.3s;
    }

    body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      background-size: cover;
      background-position: center 30%;
      background-attachment: fixed;
      transition: background-image var(--transition-speed) ease-in-out;
    }

    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 40%, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.75) 100%);
      z-index: -1;
      pointer-events: none;
    }

    .verse-container {
      max-width: 720px;
      width: 100%;
      background: rgba(20, 25, 28, 0.65);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 2rem;
      border: 1px solid var(--accent-color);
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px var(--accent-glow) inset;
      padding: 2rem 1.8rem;
      transition: border-color var(--transition-speed), box-shadow var(--transition-speed);
      animation: fadeScaleUp 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    @keyframes fadeScaleUp {
      0% {
        opacity: 0;
        transform: scale(0.96) translateY(12px);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .verse-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .verse-header h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 500;
      font-size: 1.8rem;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #F5E7D3 0%, var(--accent-color) 100%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      display: inline-block;
      padding-bottom: 0.3rem;
      border-bottom: 2px solid var(--accent-color);
    }

    .verse-content {
      text-align: center;
      margin: 2rem 0 1.5rem;
      min-height: 220px;
    }
    .verse-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem;
      line-height: 1.45;
      font-weight: 500;
      color: #FCF7F0;
      text-shadow: 0 2px 5px rgba(0,0,0,0.2);
      margin-bottom: 1rem;
    }
    .verse-text::before {
      content: "“";
      font-size: 2.2rem;
      color: var(--accent-color);
      font-family: serif;
      margin-right: 4px;
    }
    .verse-text::after {
      content: "”";
      font-size: 2.2rem;
      color: var(--accent-color);
      font-family: serif;
      margin-left: 4px;
      vertical-align: top;
    }
    .verse-reference-wrapper {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
      padding: 0.2rem 1rem;
      border-radius: 40px;
      margin-top: 0.5rem;
    }
    .verse-reference {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent-color);
      letter-spacing: 0.5px;
    }
    .chapter-link {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      font-size: 1.1rem;
      transition: transform 0.2s;
      margin-left: 4px;
    }
    .chapter-link:hover {
      transform: scale(1.1);
    }
    .chapter-link span {
      font-size: 1.2rem;
    }

    /* LOADING COM TEMPORIZADOR */
    .loading-timer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 1rem 0;
    }
    .timer-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--accent-color);
      font-family: monospace;
      border: 2px solid var(--accent-color);
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }
    .loading-message {
      font-size: 1rem;
      color: #CBD5E1;
      font-weight: 400;
      background: rgba(0,0,0,0.4);
      padding: 0.3rem 1rem;
      border-radius: 50px;
      backdrop-filter: blur(4px);
    }
    .delay-message {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: #E4B363;
      background: rgba(0,0,0,0.5);
      padding: 0.4rem 1rem;
      border-radius: 30px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    .buttons-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin-top: 1.8rem;
      margin-bottom: 1rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 0.8rem 1.6rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
      background: transparent;
      font-family: 'Inter', sans-serif;
      backdrop-filter: blur(8px);
      text-decoration: none;
    }
    .btn-wa {
      background: linear-gradient(105deg, #25D366 0%, #128C7E 100%);
      color: white;
      box-shadow: 0 5px 12px rgba(37, 211, 102, 0.25);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .btn-wa:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(37, 211, 102, 0.35);
    }
    .btn-refresh {
      background: rgba(20, 25, 28, 0.8);
      border: 1px solid var(--accent-color);
      color: #F5E7D3;
    }
    .btn-refresh:hover {
      background: rgba(228, 179, 99, 0.2);
      transform: translateY(-2px);
    }
    .btn:active {
      transform: translateY(1px);
    }

    .footer-credit {
      text-align: center;
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--accent-color);
      font-size: 0.7rem;
      color: #A0B3B7;
      transition: border-color var(--transition-speed);
    }
    .footer-credit strong {
      color: var(--accent-color);
    }

    @media (max-width: 580px) {
      .verse-container { padding: 1.5rem; }
      .verse-text { font-size: 1.3rem; }
      .verse-text::before, .verse-text::after { font-size: 1.6rem; }
      .btn { padding: 0.6rem 1.2rem; font-size: 0.8rem; }
      .verse-header h1 { font-size: 1.5rem; }
      .verse-reference-wrapper { gap: 5px; }
      .verse-reference { font-size: 0.9rem; }
      .chapter-link span { font-size: 1rem; }
      .timer-circle { width: 65px; height: 65px; font-size: 1.8rem; }
    }
    @media (max-width: 450px) {
      .buttons-group { flex-direction: column; align-items: stretch; }
      .btn { justify-content: center; }
    }
  </style>
</head>
<body>

<div class="verse-container">
  <div class="verse-header">
    <h1>Versículo do Dia</h1>
  </div>

  <div id="verseDynamicZone" class="verse-content"></div>

  <div class="buttons-group">
    <button class="btn btn-refresh" id="refreshBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      Novo Versículo
    </button>
    <div id="whatsappBtnContainer"></div>
  </div>

  <div class="footer-credit">
    ✨ Desenvolvido por <strong>Fábio Cruz</strong>
  </div>
</div>

<script>
  // ============================================================
  // VERSÃO ARA COM TEMPORIZADOR E MENSAGEM DE DEMORA
  // ============================================================
  
  const API_RANDOM_VERSE = 'https://bible-api.com/data/ara/random';
  const CACHE_SIZE = 4;
  const TIMEOUT_MS = 12000;        // limite de 12 segundos para a requisição

  const dynamicZone = document.getElementById('verseDynamicZone');
  const refreshBtn = document.getElementById('refreshBtn');
  const waContainer = document.getElementById('whatsappBtnContainer');

  let verseCache = [];
  let currentVerse = null;
  let isLoading = false;
  let timerInterval = null;
  let startTime = null;

  // Temas interativos
  const themes = [
    { name: 'paz', keywords: ['paz', 'calma', 'descanso', 'silêncio', 'tranquilidade', 'sossego', 'serenidade'], accent: '#6C91B2', bgImage: 'https://images.pexels.com/photos/457881/pexels-photo-457881.jpeg?auto=compress&cs=tinysrgb&w=1600' },
    { name: 'alegria', keywords: ['alegria', 'feliz', 'contentamento', 'regozijo', 'dança', 'cântico', 'júbilo', 'exultar'], accent: '#F4B942', bgImage: 'https://images.pexels.com/photos/931018/pexels-photo-931018.jpeg?auto=compress&cs=tinysrgb&w=1600' },
    { name: 'amor', keywords: ['amor', 'amado', 'caridade', 'afeto', 'bondade', 'misericórdia', 'ágape', 'querido'], accent: '#D9738A', bgImage: 'https://images.pexels.com/photos/56866/garden-rose-red-pink-56866.jpeg?auto=compress&cs=tinysrgb&w=1600' },
    { name: 'esperança', keywords: ['esperança', 'confiança', 'esperar', 'aguardar', 'futuro', 'promessa', 'expectativa'], accent: '#7CAF7C', bgImage: 'https://images.pexels.com/photos/1167355/pexels-photo-1167355.jpeg?auto=compress&cs=tinysrgb&w=1600' },
    { name: 'força', keywords: ['força', 'coragem', 'valente', 'firmeza', 'poder', 'fortaleza', 'ânimo', 'robusto'], accent: '#D97A3C', bgImage: 'https://images.pexels.com/photos/618848/pexels-photo-618848.jpeg?auto=compress&cs=tinysrgb&w=1600' },
    { name: 'fé', keywords: ['fé', 'crer', 'confiar', 'crente', 'acreditar', 'fidelidade', 'certeza'], accent: '#A37CBB', bgImage: 'https://images.pexels.com/photos/2387795/pexels-photo-2387795.jpeg?auto=compress&cs=tinysrgb&w=1600' },
    { name: 'luz', keywords: ['luz', 'resplendor', 'brilho', 'iluminar', 'candeia', 'lâmpada', 'clarão'], accent: '#F0D85C', bgImage: 'https://images.pexels.com/photos/274062/pexels-photo-274062.jpeg?auto=compress&cs=tinysrgb&w=1600' },
    { name: 'gratidão', keywords: ['graças', 'gratidão', 'agradecer', 'louvor', 'ação de graças', 'reconhecimento'], accent: '#E4A951', bgImage: 'https://images.pexels.com/photos/1146762/pexels-photo-1146762.jpeg?auto=compress&cs=tinysrgb&w=1600' }
  ];
  const defaultTheme = { accent: '#E4B363', bgImage: 'https://images.pexels.com/photos/1191710/forest-mist-morning-nature-1191710.jpeg?auto=compress&cs=tinysrgb&w=1600' };

  const bookNameMap = {
    "gn": "Gênesis", "ex": "Êxodo", "lv": "Levítico", "nm": "Números", "dt": "Deuteronômio",
    "js": "Josué", "jz": "Juízes", "rt": "Rute", "1sm": "1 Samuel", "2sm": "2 Samuel",
    "1rs": "1 Reis", "2rs": "2 Reis", "1cr": "1 Crônicas", "2cr": "2 Crônicas", "ed": "Esdras",
    "ne": "Neemias", "et": "Ester", "jó": "Jó", "sl": "Salmos", "pv": "Provérbios",
    "ec": "Eclesiastes", "ct": "Cantares", "is": "Isaías", "jr": "Jeremias", "lm": "Lamentações",
    "ez": "Ezequiel", "dn": "Daniel", "os": "Oséias", "jl": "Joel", "am": "Amós", "ob": "Obadias",
    "jn": "Jonas", "mq": "Miquéias", "na": "Naum", "hc": "Habacuque", "sf": "Sofonias", "ag": "Ageu",
    "zc": "Zacarias", "ml": "Malaquias", "mt": "Mateus", "mc": "Marcos", "lc": "Lucas", "jo": "João",
    "atos": "Atos", "rm": "Romanos", "1co": "1 Coríntios", "2co": "2 Coríntios", "gl": "Gálatas",
    "ef": "Efésios", "fp": "Filipenses", "cl": "Colossenses", "1ts": "1 Tessalonicenses", "2ts": "2 Tessalonicenses",
    "1tm": "1 Timóteo", "2tm": "2 Timóteo", "tt": "Tito", "fm": "Filemom", "hb": "Hebreus",
    "tg": "Tiago", "1pe": "1 Pedro", "2pe": "2 Pedro", "1jo": "1 João", "2jo": "2 João",
    "3jo": "3 João", "jd": "Judas", "ap": "Apocalipse"
  };

  function applyTheme(verseText) {
    const lowerText = verseText.toLowerCase();
    let selectedTheme = defaultTheme;
    for (const theme of themes) {
      if (theme.keywords.some(keyword => lowerText.includes(keyword))) {
        selectedTheme = { accent: theme.accent, bgImage: theme.bgImage };
        break;
      }
    }
    document.documentElement.style.setProperty('--accent-color', selectedTheme.accent);
    const r = parseInt(selectedTheme.accent.slice(1,3), 16);
    const g = parseInt(selectedTheme.accent.slice(3,5), 16);
    const b = parseInt(selectedTheme.accent.slice(5,7), 16);
    document.documentElement.style.setProperty('--accent-glow', `rgba(${r}, ${g}, ${b}, 0.3)`);
    document.body.style.backgroundImage = `url('${selectedTheme.bgImage}')`;
    document.body.style.backgroundPosition = 'center 30%';
    document.body.style.backgroundAttachment = 'fixed';
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function getChapterLink(bookAbbrev, chapter) {
    let bookSlug = bookAbbrev.toLowerCase();
    const specialSlugs = {
      "1sm": "1samuel", "2sm": "2samuel", "1rs": "1reis", "2rs": "2reis",
      "1cr": "1cronicas", "2cr": "2cronicas", "ct": "cantares", "ec": "eclesiastes",
      "jr": "jeremias", "is": "isaias", "jo": "joao", "lc": "lucas", "mc": "marcos",
      "mt": "mateus", "atos": "atos", "ap": "apocalipse", "1co": "1corintios", "2co": "2corintios",
      "1ts": "1tessalonicenses", "2ts": "2tessalonicenses", "1tm": "1timoteo", "2tm": "2timoteo",
      "1pe": "1pedro", "2pe": "2pedro", "1jo": "1joao", "2jo": "2joao", "3jo": "3joao"
    };
    let slug = specialSlugs[bookSlug] || bookSlug;
    slug = slug.replace(/\s/g, '');
    return `https://www.bibliaonline.com.br/nvi/${slug}/${chapter}`;
  }

  function displayVerse(verseText, reference, bookAbbrev, chapter, verseNumber) {
    // Para o timer, se estiver rodando
    stopTimer();

    const chapterUrl = getChapterLink(bookAbbrev, chapter);
    const fullBookName = bookNameMap[bookAbbrev.toLowerCase()] || bookAbbrev;
    const displayReference = `${fullBookName} ${chapter}:${verseNumber}`;
    
    dynamicZone.innerHTML = `
      <div class="verse-text">${escapeHtml(verseText)}</div>
      <div class="verse-reference-wrapper">
        <span class="verse-reference">${escapeHtml(displayReference)}</span>
        <a href="${chapterUrl}" target="_blank" rel="noopener noreferrer" class="chapter-link" title="Ler capítulo completo (NVI)">
          <span>📖</span>
        </a>
      </div>
    `;
    const shareMsg = `${verseText} (${displayReference} - ARA)`;
    const waUrl = `https://wa.me/?text=${encodeURIComponent(shareMsg)}`;
    waContainer.innerHTML = `
      <a href="${waUrl}" target="_blank" rel="noopener noreferrer" class="btn btn-wa">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M12.04 2c-5.46 0-9.91 4.45-9.91 9.91 0 1.75.46 3.45 1.32 4.95L2.05 22l5.25-1.38c1.45.79 3.08 1.21 4.74 1.21 5.46 0 9.91-4.45 9.91-9.91 0-5.45-4.45-9.9-9.91-9.9zm0 18.23c-1.5 0-2.97-.39-4.26-1.12l-.3-.18-3.12.82.84-3.04-.2-.31c-.79-1.35-1.21-2.9-1.21-4.48 0-4.56 3.71-8.27 8.27-8.27 4.56 0 8.27 3.71 8.27 8.27-.02 4.55-3.72 8.26-8.29 8.26zM16.5 13.5c-.26-.13-1.55-.77-1.79-.86-.23-.09-.42-.13-.6.13-.18.26-.69.86-.85 1.04-.16.18-.31.2-.58.07-.26-.13-1.12-.41-2.13-1.32-.79-.71-1.32-1.59-1.47-1.86-.16-.26-.02-.4.11-.53.11-.12.26-.31.39-.47.13-.16.17-.26.26-.43.09-.17.04-.32-.02-.45s-.6-1.44-.82-1.97c-.21-.52-.43-.45-.6-.46-.16-.01-.34-.01-.52-.01-.18 0-.47.07-.71.32-.25.25-.94.92-.94 2.24 0 1.32.96 2.6 1.09 2.78.14.18 1.89 2.88 4.57 4.03 2.68 1.15 2.68.77 3.16.72.48-.05 1.55-.63 1.77-1.24.22-.61.22-1.13.15-1.24-.06-.1-.23-.16-.49-.29z" fill="white"/>
        </svg>
        Compartilhar no WhatsApp
      </a>
    `;
    applyTheme(verseText);
  }

  // Mostra o loading com temporizador (contagem crescente)
  function showLoadingWithTimer() {
    // Para qualquer timer anterior
    stopTimer();
    
    // Limpa a área e mostra o timer
    dynamicZone.innerHTML = `
      <div class="loading-timer" id="timerContainer">
        <div class="timer-circle" id="timerSeconds">0</div>
        <div class="loading-message">Buscando versículo...</div>
        <div id="delayMessage" style="min-height: 50px;"></div>
      </div>
    `;
    waContainer.innerHTML = '';
    
    startTime = Date.now();
    let seconds = 0;
    const timerEl = document.getElementById('timerSeconds');
    const delayMsgDiv = document.getElementById('delayMessage');
    
    timerInterval = setInterval(() => {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      if (timerEl) timerEl.textContent = elapsed;
      
      // Se ultrapassar 10 segundos, mostra mensagem de desculpa
      if (elapsed >= 10 && delayMsgDiv && !delayMsgDiv.innerHTML) {
        delayMsgDiv.innerHTML = `
          <div class="delay-message">
            🙏 Estamos buscando o versículo, desculpe a demora.<br>
            Muitas requisições ao mesmo tempo. Em breve aparecerá.
          </div>
        `;
      }
    }, 1000);
  }

  function stopTimer() {
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
  }

  // Loading sem timer (para cache rápido, mas vamos usar o timer mesmo assim)
  function showLoadingFallback() {
    stopTimer();
    dynamicZone.innerHTML = `
      <div class="loading-timer">
        <div class="loading-message">Aguarde, carregando versículo...</div>
      </div>
    `;
    waContainer.innerHTML = '';
  }

  async function fetchVerseFromAPI() {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), TIMEOUT_MS);
    try {
      const response = await fetch(API_RANDOM_VERSE, { 
        signal: controller.signal,
        headers: { 'Accept': 'application/json' }
      });
      clearTimeout(timeoutId);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      return {
        text: data.text,
        reference: data.reference,
        book: data.book_id,
        chapter: data.chapter,
        verseNumber: data.verse
      };
    } catch (error) {
      clearTimeout(timeoutId);
      console.warn('API fetch error:', error);
      return null;
    }
  }

  function isVerseInCache(verse) {
    if (!verse) return true;
    return verseCache.some(v => v.reference === verse.reference);
  }

  async function addToCache() {
    if (isLoading) return;
    let newVerse = null;
    let attempts = 0;
    const maxAttempts = 5;
    while (!newVerse && attempts < maxAttempts) {
      const fetched = await fetchVerseFromAPI();
      if (fetched && !isVerseInCache(fetched) && (!currentVerse || fetched.reference !== currentVerse.reference)) {
        newVerse = fetched;
        break;
      }
      attempts++;
      await new Promise(r => setTimeout(r, 200));
    }
    if (newVerse) {
      verseCache.push(newVerse);
      if (verseCache.length > CACHE_SIZE) verseCache.shift();
    }
  }

  async function preloadCache() {
    while (verseCache.length < CACHE_SIZE && !isLoading) {
      await addToCache();
      await new Promise(r => setTimeout(r, 400));
    }
  }

  async function getNextVerse() {
    if (verseCache.length > 0) {
      let index = 0;
      while (index < verseCache.length && currentVerse && verseCache[index].reference === currentVerse.reference) index++;
      if (index < verseCache.length) {
        const next = verseCache[index];
        verseCache.splice(index, 1);
        addToCache(); // reposição assíncrona
        return next;
      }
    }
    
    // Se cache não tem disponível, busca da API com timer ativo
    let newVerse = null;
    let attempts = 0;
    while (!newVerse && attempts < 3) {
      const fetched = await fetchVerseFromAPI();
      if (fetched && (!currentVerse || fetched.reference !== currentVerse.reference)) {
        newVerse = fetched;
        break;
      }
      attempts++;
      await new Promise(r => setTimeout(r, 300));
    }
    if (newVerse) return newVerse;
    
    // Fallback
    return {
      text: "O Senhor é o meu pastor; nada me faltará.",
      reference: "sl 23:1",
      book: "sl",
      chapter: 23,
      verseNumber: 1
    };
  }

  async function loadNewVerse() {
    if (isLoading) return;
    isLoading = true;
    
    // Inicia o timer visual
    showLoadingWithTimer();
    
    try {
      const verse = await getNextVerse();
      if (verse) {
        currentVerse = verse;
        displayVerse(verse.text, verse.reference, verse.book, verse.chapter, verse.verseNumber);
      } else {
        const emergency = { text: "Buscai ao Senhor enquanto se pode achar.", reference: "is 55:6", book: "is", chapter: 55, verseNumber: 6 };
        currentVerse = emergency;
        displayVerse(emergency.text, emergency.reference, emergency.book, emergency.chapter, emergency.verseNumber);
      }
    } catch (err) {
      console.error(err);
      const emergency = { text: "Deus é o nosso refúgio e fortaleza.", reference: "sl 46:1", book: "sl", chapter: 46, verseNumber: 1 };
      displayVerse(emergency.text, emergency.reference, emergency.book, emergency.chapter, emergency.verseNumber);
    } finally {
      isLoading = false;
      if (verseCache.length < 2) preloadCache();
    }
  }

  refreshBtn.addEventListener('click', () => {
    if (isLoading) return;
    loadNewVerse();
  });

  // Inicialização
  (async function init() {
    showLoadingWithTimer();
    await preloadCache();
    await loadNewVerse();
  })();
</script>
</body>
</html>
